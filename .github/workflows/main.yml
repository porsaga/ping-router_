name: Router Heartbeat

on:
  schedule:
    - cron: '*/5 * * * *' # รันอัตโนมัติทุก 5 นาที
  workflow_dispatch: # ปุ่มสำหรับกดรันเองด้วยมือ

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Heartbeat Script
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
        run: python ping_script.py
